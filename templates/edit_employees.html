<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Employee</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" value="{{ employee.name }}" placeholder="Employee Name" required>

        <input type="email" name="email" value="{{ employee.email }}" placeholder="Email" required>

        <input type="text" name="department" value="{{ employee.department }}" placeholder="Department" required>

        <input type="number" name="salary" value="{{ employee.salary }}" placeholder="Salary" required>

        <button type="submit">Update Employee</button>
    </form>

    <a class="back" href="{% url 'home' %}">← Back to Dashboard</a>
</div>

</body>
</html>
