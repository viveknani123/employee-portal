<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Employee</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .info {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .value {
            float: right;
            color: #222;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Details</h2>

    <div class="info">
        <span class="label">Name</span>
        <span class="value">{{ employee.name }}</span>
    </div>

    <div class="info">
        <span class="label">Email</span>
        <span class="value">{{ employee.email }}</span>
    </div>

    <div class="info">
        <span class="label">Department</span>
        <span class="value">{{ employee.department }}</span>
    </div>

    <div class="info">
        <span class="label">Salary</span>
        <span class="value">{{ employee.salary }}</span>
    </div>

    <a class="back" href="{% url 'home' %}">← Back to Dashboard</a>
</div>

</body>
</html>
