<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            background: #111;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #575757;
        }

        .main {
            margin-left: 230px;
            padding: 20px;
        }

        .card-box {
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px gray;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#">Employees</a>
    <a href="/logout/">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <h2>Welcome {{ user.fullname }}</h2>

    <div class="card-box mt-3">
        <h5>User Details</h5>
        <hr>
        <p><b>Email:</b> {{ user.email }}</p>
        <p><b>Phone:</b> {{ user.phone }}</p>
        <p><b>Department:</b> {{ user.department }}</p>
    </div>

</div>
<div class="card-box mt-4">
    <h5>System Activity Chart</h5>
    <canvas id="myChart" width="400" height="200"></canvas>
</div>
<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Login', 'Register', 'Active Users'],
        datasets: [{
            label: 'System Stats',
            data: [12, 19, 7],
            backgroundColor: ['blue', 'green', 'orange']
        }]
    }
});
</script>
</body>
</html>
