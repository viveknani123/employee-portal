{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - Employee Productivity & Wellbeing System</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .register-card{
            width:420px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 8px 25px rgba(0,0,0,0.15);
        }

        .register-card h1{
            text-align:center;
            color:#0f172a;
            margin-bottom:10px;
        }

        .register-card p{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:7px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            box-sizing:border-box;
        }

        input:focus{
            outline:none;
            border:2px solid #2563eb;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:17px;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .success{
            background:#dcfce7;
            color:#166534;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="register-card">

    <h1><i class="fa-solid fa-user-plus"></i> Register</h1>

    <p>Create your employee account</p>

    {% if msg %}
        {% if "Successful" in msg %}
            <div class="success">
                ✅ {{ msg }}
            </div>
        {% else %}
            <div class="error">
                ❌ {{ msg }}
            </div>
        {% endif %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text"
                   name="fullname"
                   placeholder="Enter full name"
                   required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   name="email"
                   placeholder="Enter email"
                   required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text"
                   name="phone"
                   placeholder="Enter phone number"
                   required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text"
                   name="department"
                   placeholder="Enter department"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>
        </div>

        <button class="btn" type="submit">
            Create Account
        </button>

    </form>

    <div class="bottom-text">
        Already have an account?
        <a href="/login/">Login</a>
    </div>

</div>

</body>
</html>
