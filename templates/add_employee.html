<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <style>

        body{
            background:#f4f7fc;
            font-family:Arial;
        }

        .card{
            width:500px;
            background:white;
            margin:50px auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
        }

    </style>

</head>
<body>

<div class="card">

    <h1>➕ Add Employee</h1>

    {% if msg %}
        <div class="error">
            {{ msg }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="fullname"
            placeholder="Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            required>

        <input
            type="text"
            name="department"
            placeholder="Department"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Add Employee
        </button>

    </form>

</div>

</body>
</html>
