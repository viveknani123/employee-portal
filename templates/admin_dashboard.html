<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>

        body{
            font-family:Arial;
            background:#f4f7fc;
            padding:40px;
        }

        .container{
            max-width:1000px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#1e293b;
        }

        .cards{
            display:flex;
            gap:20px;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:40px;
        }

        .card{
            background:white;
            width:250px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
        }

        .card h2{
            color:#2563eb;
            font-size:40px;
        }

        .card p{
            color:gray;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Admin Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>{{ total_employees }}</h2>
            <p>Total Employees</p>
        </div>

        <div class="card">
            <h2>{{ total_logins }}</h2>
            <p>Total Logins</p>
        </div>

        <div class="card">
            <h2>{{ departments }}</h2>
            <p>Departments</p>
        </div>

    </div>

</div>

</body>
</html>
